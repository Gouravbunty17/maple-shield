<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <defs>
    <!-- Clip: show only upper arc (above and around shield) -->
    <clipPath id="arcClip">
      <rect x="200" y="0" width="500" height="290"/>
    </clipPath>
    <clipPath id="arcClip2">
      <rect x="220" y="0" width="480" height="285"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#e9ebee"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- RADAR ARCS (dashed, upper only)         -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Outer dashed arc -->
  <circle cx="430" cy="265" r="196"
          fill="none"
          stroke="#2d5fa8"
          stroke-width="2.8"
          stroke-dasharray="14 9"
          opacity="0.75"
          clip-path="url(#arcClip)"/>

  <!-- Inner dashed arc (slightly smaller) -->
  <circle cx="430" cy="265" r="175"
          fill="none"
          stroke="#2d5fa8"
          stroke-width="1.8"
          stroke-dasharray="9 7"
          opacity="0.45"
          clip-path="url(#arcClip2)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- CROSSHAIR — top of arc (12 o'clock)     -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="430" y1="55" x2="430" y2="82" stroke="#2d5fa8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="418" y1="68" x2="442" y2="68" stroke="#2d5fa8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- CROSSHAIR — right of arc (2–3 o'clock)  -->
  <line x1="614" y1="265" x2="638" y2="265" stroke="#2d5fa8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="626" y1="253" x2="626" y2="277" stroke="#2d5fa8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- DRONE SILHOUETTE (upper right of arc)   -->
  <!-- at ~38° from top: (430+196*sin38, 265-196*cos38) ≈ (551, 111) -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(554,112) scale(1.15)">
    <!-- Arms -->
    <line x1="-11" y1="-3" x2="-26" y2="-13" stroke="#2d5fa8" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="11"  y1="-3" x2="26"  y2="-13" stroke="#2d5fa8" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-11" y1="3"  x2="-26" y2="13"  stroke="#2d5fa8" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="11"  y1="3"  x2="26"  y2="13"  stroke="#2d5fa8" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Propeller rings -->
    <circle cx="-26" cy="-13" r="7.5" fill="none" stroke="#2d5fa8" stroke-width="2"/>
    <circle cx="26"  cy="-13" r="7.5" fill="none" stroke="#2d5fa8" stroke-width="2"/>
    <circle cx="-26" cy="13"  r="7.5" fill="none" stroke="#2d5fa8" stroke-width="2"/>
    <circle cx="26"  cy="13"  r="7.5" fill="none" stroke="#2d5fa8" stroke-width="2"/>
    <!-- Body -->
    <rect x="-11" y="-7" width="22" height="14" rx="3.5" fill="#2d5fa8"/>
    <!-- Camera dome -->
    <circle cx="0" cy="7" r="4" fill="#1a3057"/>
    <circle cx="0" cy="7" r="2" fill="#4a7fc0" opacity="0.6"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- SHIELD BODY                             -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Classic heater shield -->
  <path d="M430,112 L572,112 L572,296 Q572,404 430,446 Q288,404 288,296 L288,112 Z"
        fill="#1a3057"/>

  <!-- Inner border (inset ~16px) -->
  <path d="M430,128 L556,128 L556,291 Q556,390 430,428 Q304,390 304,291 L304,128 Z"
        fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.25"/>

  <!-- Vertical center line (two-tone divider) -->
  <line x1="430" y1="128" x2="430" y2="428"
        stroke="#2d5fa8" stroke-width="1.2" opacity="0.5"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- MAPLE LEAF (white, centered in shield)  -->
  <!-- 11-point leaf, centered at (430, 290)   -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(430,288) scale(2.5)">
    <path d="
      M 0,-52
      L 5,-36  L 19,-42  L 11,-26  L 32,-17  L 19,-8
      L 24,8   L 11,3    L 13,22
      L 0,16
      L -13,22 L -11,3   L -24,8   L -19,-8
      L -32,-17 L -11,-26 L -19,-42 L -5,-36 Z
    " fill="white"/>
    <!-- Stem -->
    <rect x="-3.2" y="21" width="6.4" height="13" rx="1.5" fill="white"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- WORDMARK                                -->
  <!-- ═══════════════════════════════════════ -->
  <text x="430" y="500"
        font-size="60"
        text-anchor="middle"
        fill="#1a3057"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="400"
        letter-spacing="5">MAPLE <tspan font-weight="800" letter-spacing="3">SHIELD</tspan></text>

  <!-- Tagline -->
  <text x="430" y="534"
        font-size="15.5"
        text-anchor="middle"
        fill="#2d5fa8"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="500"
        letter-spacing="3.5">AI AIRSPACE INTELLIGENCE &amp; DETECTION</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maple Shield — C2 Simulator</title>
<style>
  :root {
    --bg:       #060d1a;
    --panel:    #0b1628;
    --border:   #1a3050;
    --accent:   #1e6db5;
    --text:     #c8d8ea;
    --dim:      #4a6070;
    --clear:    #22c55e;
    --medium:   #f59e0b;
    --high:     #ef4444;
    --critical: #7c3aed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  #header { display: flex; align-items: center; gap: 16px; padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border); }
  .logo { font-size: 15px; font-weight: bold; color: #fff; letter-spacing: 2px; }
  .logo span { color: var(--accent); }
  .badge { padding: 3px 10px; border-radius: 2px; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
  .badge-live { background: #052e16; color: var(--clear); border: 1px solid var(--clear); }
  .badge-off  { background: #1a1a00; color: #888; border: 1px solid #333; }
  .hdr-stat { color: var(--dim); font-size: 11px; }
  .hdr-stat b { color: var(--text); }
  #clear-btn { margin-left: auto; background: #0a1830; border: 1px solid var(--border); color: var(--dim); padding: 4px 14px; cursor: pointer; font-family: inherit; font-size: 12px; }
  #clear-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Status bar */
  #status-bar { display: flex; gap: 20px; padding: 8px 20px; background: #08111f; border-bottom: 1px solid var(--border); font-size: 11px; }
  .status-item { display: flex; flex-direction: column; gap: 2px; }
  .status-label { color: var(--dim); text-transform: uppercase; letter-spacing: 1px; font-size: 9px; }
  .status-val   { color: #fff; font-size: 16px; font-weight: bold; }
  .status-val.threat-med  { color: var(--medium); }
  .status-val.threat-high { color: var(--high); }
  .status-val.threat-crit { color: var(--critical); }

  /* Main */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* Alert feed */
  #alert-feed { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #feed-header { padding: 8px 20px; font-size: 10px; letter-spacing: 2px; color: var(--dim); border-bottom: 1px solid var(--border); }
  #feed-list { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
  #feed-list::-webkit-scrollbar { width: 4px; }
  #feed-list::-webkit-scrollbar-thumb { background: var(--border); }

  .alert-card { background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--dim); padding: 10px 14px; border-radius: 2px; animation: slideIn 0.2s ease; }
  .alert-card.c-medium   { border-left-color: var(--medium); }
  .alert-card.c-high     { border-left-color: var(--high);   background: #100c00; }
  .alert-card.c-critical { border-left-color: var(--critical); background: #0e001a; }

  @keyframes slideIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform: translateX(0); } }

  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .card-threat { font-weight: bold; letter-spacing: 1px; font-size: 13px; }
  .card-ts { color: var(--dim); font-size: 10px; margin-left: auto; }
  .card-track { color: #fff; }
  .card-body  { display: flex; gap: 20px; font-size: 11px; color: var(--dim); flex-wrap: wrap; }
  .card-body span b { color: var(--text); }
  .zone-warn { color: var(--high); font-weight: bold; margin-top: 4px; font-size: 11px; }

  /* Empty state */
  #empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 10px; color: var(--dim); }
  #empty-state .big { font-size: 40px; }

  /* Right sidebar — session log */
  #sidebar { width: 260px; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #sb-header { padding: 8px 14px; font-size: 10px; letter-spacing: 2px; color: var(--dim); border-bottom: 1px solid var(--border); }
  #session-log { flex: 1; overflow-y: auto; padding: 8px; font-size: 11px; color: var(--dim); }
  .log-line { padding: 2px 0; border-bottom: 1px solid #0d1e30; }
  .log-line b { color: var(--text); }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo">🛡️ MAPLE <span>SHIELD</span></div>
  <div class="badge badge-off" id="conn-badge">● CONNECTING</div>
  <span class="hdr-stat">SESSION <b id="hdr-session">—</b></span>
  <span class="hdr-stat">ALERTS <b id="hdr-count">0</b></span>
  <button id="clear-btn" onclick="clearAlerts()">Clear</button>
</div>

<!-- Status bar -->
<div id="status-bar">
  <div class="status-item">
    <div class="status-label">Max Threat</div>
    <div class="status-val" id="sb-max-threat">CLEAR</div>
  </div>
  <div class="status-item">
    <div class="status-label">Active Tracks</div>
    <div class="status-val" id="sb-tracks">0</div>
  </div>
  <div class="status-item">
    <div class="status-label">Zone Breaches</div>
    <div class="status-val threat-high" id="sb-zone">0</div>
  </div>
  <div class="status-item">
    <div class="status-label">Last Alert</div>
    <div class="status-val" id="sb-last-ts">—</div>
  </div>
  <div class="status-item">
    <div class="status-label">Source</div>
    <div class="status-val" id="sb-source" style="font-size:12px">—</div>
  </div>
</div>

<!-- Main -->
<div id="main">
  <!-- Alert feed -->
  <div id="alert-feed">
    <div id="feed-header">LIVE ALERT FEED — C2 INTERFACE</div>
    <div id="feed-list">
      <div id="empty-state">
        <div class="big">📡</div>
        <div>Waiting for Maple Shield alerts…</div>
        <div style="font-size:11px">Start the detection pipeline to begin receiving alerts.</div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sb-header">SESSION LOG</div>
    <div id="session-log"></div>
  </div>
</div>

<script>
const THREAT_COLOR = {
  MEDIUM:   "#f59e0b",
  HIGH:     "#ef4444",
  CRITICAL: "#7c3aed",
  LOW:      "#06b6d4",
  CLEAR:    "#22c55e",
};

let alertCount = 0;
let zoneBreaches = 0;
let activeTracks = new Set();
let maxThreatRank = 0;
const THREAT_RANK = { CLEAR:0, LOW:1, MEDIUM:2, HIGH:3, CRITICAL:4 };
const THREAT_NAMES = ["CLEAR","LOW","MEDIUM","HIGH","CRITICAL"];

function threatClass(t) {
  return { MEDIUM:"c-medium", HIGH:"c-high", CRITICAL:"c-critical" }[t] || "";
}

function log(msg) {
  const el = document.getElementById("session-log");
  const ts = new Date().toISOString().substr(11,8);
  const div = document.createElement("div");
  div.className = "log-line";
  div.innerHTML = `<b>${ts}</b> ${msg}`;
  el.prepend(div);
  if (el.children.length > 100) el.lastChild.remove();
}

function renderAlert(alert) {
  // Remove empty state
  const empty = document.getElementById("empty-state");
  if (empty) empty.remove();

  alertCount++;
  document.getElementById("hdr-count").textContent = alertCount;

  // Track stats
  activeTracks.add(alert.track_id);
  if (alert.in_zone) zoneBreaches++;
  if ((THREAT_RANK[alert.threat_level] || 0) > maxThreatRank) {
    maxThreatRank = THREAT_RANK[alert.threat_level];
  }

  // Update status bar
  document.getElementById("sb-tracks").textContent = activeTracks.size;
  document.getElementById("sb-zone").textContent   = zoneBreaches;
  document.getElementById("sb-max-threat").textContent = THREAT_NAMES[maxThreatRank];
  document.getElementById("sb-max-threat").className = "status-val " + {
    2:"threat-med", 3:"threat-high", 4:"threat-crit"
  }[maxThreatRank] || "";
  const ts = alert.timestamp ? new Date(alert.timestamp).toISOString().substr(11,8) : "—";
  document.getElementById("sb-last-ts").textContent = ts;
  if (alert.session_id) {
    document.getElementById("hdr-session").textContent = alert.session_id;
    document.getElementById("sb-source").textContent   = alert._source || "MQTT";
  }

  const color = THREAT_COLOR[alert.threat_level] || "#fff";
  const card = document.createElement("div");
  card.className = `alert-card ${threatClass(alert.threat_level)}`;
  card.innerHTML = `
    <div class="card-top">
      <span class="card-threat" style="color:${color}">▲ ${alert.threat_level}</span>
      <span class="card-track">Track ID ${alert.track_id}  ·  ${alert.label || "unknown"}</span>
      <span class="card-ts">${ts}  ·  Frame ${alert.frame_id || "—"}</span>
    </div>
    <div class="card-body">
      <span>Conf <b>${((alert.conf || 0)*100).toFixed(0)}%</b></span>
      <span>Score <b>${((alert.threat_score || 0)*100).toFixed(0)}%</b></span>
      <span>Vel <b>${(alert.velocity_px || 0).toFixed(1)} px/fr</b></span>
      <span>Type <b>${alert.object_type || "—"}</b></span>
      <span>FPS <b>${(alert.fps || 0).toFixed(1)}</b></span>
      ${alert.prev_threat ? `<span>Was <b>${alert.prev_threat}</b></span>` : ""}
    </div>
    ${alert.in_zone ? '<div class="zone-warn">⚠ TARGET INSIDE PROTECTED ZONE</div>' : ""}
  `;

  const feed = document.getElementById("feed-list");
  feed.prepend(card);
  if (feed.children.length > 60) feed.lastChild.remove();

  log(`${alert.threat_level} — Track ${alert.track_id} (${alert.label})`);
}

// ── SSE connection ─────────────────────────────────────────────────────────
function connect() {
  const badge = document.getElementById("conn-badge");
  badge.textContent = "● CONNECTING";
  badge.className   = "badge badge-off";

  const es = new EventSource("/api/stream");

  es.onopen = () => {
    badge.textContent = "● LIVE";
    badge.className   = "badge badge-live";
    log("SSE connected to Maple Shield C2");
  };

  es.onmessage = (e) => {
    try {
      const alert = JSON.parse(e.data);
      if (alert.threat_level) renderAlert(alert);
    } catch (_) {}
  };

  es.onerror = () => {
    badge.textContent = "● OFFLINE";
    badge.className   = "badge badge-off";
    log("SSE disconnected — retrying in 3s");
    es.close();
    setTimeout(connect, 3000);
  };
}

async function clearAlerts() {
  await fetch("/api/clear", { method: "POST" });
  document.getElementById("feed-list").innerHTML =
    '<div id="empty-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--dim);padding:60px"><div style="font-size:40px">📡</div><div>Waiting for alerts…</div></div>';
  alertCount = 0; zoneBreaches = 0; maxThreatRank = 0;
  activeTracks.clear();
  document.getElementById("hdr-count").textContent = "0";
  document.getElementById("sb-tracks").textContent = "0";
  document.getElementById("sb-zone").textContent   = "0";
  document.getElementById("sb-max-threat").textContent = "CLEAR";
  log("Alert log cleared");
}

connect();
</script>
</body>
</html>
